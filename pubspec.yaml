name: unified_calendar
description: Application Calendrier Unifiée — Infomaniak · Notion · Flutter
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # État et injection de dépendances
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Calendrier UI
  syncfusion_flutter_calendar: ^32.0.0

  # Requêtes HTTP
  dio: ^5.7.0

  # Base de données locale
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Stockage sécurisé (tokens, secrets)
  flutter_secure_storage: ^9.2.2

  # Chiffrement AES-256
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Notifications locales
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0

  # Contacts (Android)
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1

  # Widget Android 7 jours
  home_widget: ^0.7.0

  # Connectivité réseau
  connectivity_plus: ^6.1.0

  # Sélecteur de fichiers
  file_picker: ^8.1.6

  # Export CSV
  csv: ^6.0.0

  # Internationalisation
  intl: ^0.20.0

  # Utilitaires
  path_provider: ^2.1.5
  uuid: ^4.5.1
  collection: ^1.18.0
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  open_filex: ^4.6.0

  # Polices
  google_fonts: ^6.2.1

  # Couleurs et thème
  flex_color_scheme: ^7.3.1

  # Mise en page
  sliver_tools: ^0.2.12
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.6.0+eol
  hugeicons: ^1.1.5
  qr_flutter: ^4.1.0

dependency_overrides:
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
